# This workflow is intentionally inert: it is manual-trigger only (`workflow_dispatch`) and never runs on
# push/PR, contains NO credentials, and its real Crowdin/XLIFF steps are commented out. It documents the
# intended round-trip so it can be enabled later. See docs/localization.md.
#
# To enable:
#   1. Add a repository secret `CROWDIN_PERSONAL_TOKEN` (and `CROWDIN_PROJECT_ID`).
#   2. Uncomment the real steps below and remove the placeholder step.
#   3. Optionally add `push`/`schedule` triggers.
#
# Source of truth in this repo: the two String Catalogs
#   - App/Localizable.xcstrings
#   - Packages/ProtonPhotosKit/Sources/PhotosCore/Resources/Localizable.xcstrings
# Round-trip to translators/Crowdin goes through Xcode localization export/import (XLIFF / .xcloc).

name: Localization (disabled)

on:
  workflow_dispatch: {}   # manual only — never runs automatically, never on push/PR

permissions:
  contents: read

