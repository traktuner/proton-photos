name: ProtonPhotos
options:
  bundleIdPrefix: me.protonphotos.mac
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  # English is the source/development language; the App String Catalog (App/Localizable.xcstrings)
  # adds German. Unsupported system languages fall back to English automatically.
  developmentLanguage: en

settings:
  base:
    # Swift 5 language mode (compiler is still 6.3): ProtonCore exposes a global `var CryptoGo`
    # that Swift 6 language mode rejects. The feature package opts into stricter checks itself.
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEAD_CODE_STRIPPING: YES
    ENABLE_HARDENED_RUNTIME: YES
    # App-glue code interops with ProtonCore/SDK types that aren't Sendable-annotated.
    # The pure feature modules (ProtonPhotosKit) keep their own stricter checking.
    SWIFT_STRICT_CONCURRENCY: minimal

packages:
  ProtonDriveSDK:
    path: Vendor/sdk-swift
  ProtonPhotosKit:
    path: Packages/ProtonPhotosKit
  ProtonCore:
    url: https://github.com/ProtonMail/protoncore_ios.git
    # Must match the version pinned by Vendor/sdk-swift's own Package.swift (currently 0.17.1 → 37.3.0).
    # sdk-swift 0.16.0/0.17.0 shipped an xcframework needing newer GoLibs crypto symbols
    # (_pgp_key_unlock / _pgp_reader_destroy) while still pinning 37.0.1 → link failure; 0.17.1 fixes
    # the inconsistency by bumping to 37.3.0, which exports them.
    exactVersion: 37.3.0

targets:
  ProtonPhotos:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - App
    dependencies:
      - package: ProtonDriveSDK
        product: ProtonDriveSDK
      - package: ProtonPhotosKit
        product: PhotosCore
      - package: ProtonPhotosKit
        product: DesignSystem
      - package: ProtonPhotosKit
        product: ProtonAuth
      - package: ProtonPhotosKit
        product: MediaCache
      - package: ProtonPhotosKit
        product: TimelineFeature
      - package: ProtonPhotosKit
        product: PhotoViewerFeature
      - package: ProtonPhotosKit
        product: AlbumsFeature
      - package: ProtonPhotosKit
        product: UploadFeature
      - package: ProtonCore
        product: ProtonCoreDataModel
      - package: ProtonCore
        product: ProtonCoreCrypto
      - package: ProtonCore
        product: ProtonCoreCryptoGoInterface
      - package: ProtonCore
        product: ProtonCoreCryptoPatchedGoImplementation
      - package: ProtonCore
        product: ProtonCoreKeyManager
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.protonphotos.mac
        PRODUCT_NAME: ProtonPhotos
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.photography"
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        CODE_SIGN_ENTITLEMENTS: App/ProtonPhotos.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        OTHER_CODE_SIGN_FLAGS: "--options runtime"
        # The SDK's linker flags reference the bootstrapper .o files via a path that only
        # exists for *remote* SwiftPM checkouts. Since we vendor sdk-swift as a local path
        # package, point the linker at the real Resources directory.
        LIBRARY_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/Vendor/sdk-swift/Resources
